<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance API Key | Setor API Key OpenRouter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <i class="fas fa-sun"></i>
        <label class="theme-switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider round"></span>
        </label>
        <i class="fas fa-moon"></i>
    </div>

    <div class="container">
        <div class="hero-section">
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fas fa-key"></i>
                </div>
                <h1 class="logo-text">Freelance <span class="gradient-text">API Key</span></h1>
            </div>
            <p class="tagline">Setor API Key OpenRouter | Dapatkan Saldo | Tarik ke DANA</p>
            
            <div class="cta-buttons">
                <a href="login.html" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
                <a href="register.html" class="btn btn-secondary">
                    <i class="fas fa-user-plus"></i> Register
                </a>
            </div>

            <div class="features">
                <div class="feature-card">
                    <i class="fas fa-key"></i>
                    <h3>Setor API Key</h3>
                    <p>Setor API Key OpenRouter kamu</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-coins"></i>
                    <h3>Dapatkan Saldo</h3>
                    <p>Rp 50.000 / API Key</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-wallet"></i>
                    <h3>Tarik ke DANA</h3>
                    <p>Saldo bisa ditarik kapan saja</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
